<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promptly - Prompt Library</title>
    <!-- Tailwind CSS for layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen p-4 md:p-8">
    <!-- Background Animation Layer -->
    <div id="bg-animation"></div>

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-4xl font-bold bg-gradient-to-r from-gray-300 to-gray-500 bg-clip-text text-transparent">
                    Promptly
                </h1>
                <p class="text-gray-500 mt-1">Manage your AI prompts in one place</p>
            </div>
            <div class="flex flex-wrap justify-center gap-3">
                <!-- Export Button with Toggle -->
                <div class="flex items-center gap-2 bg-[#1a1a1a] p-2 rounded-lg border border-gray-800">fx
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="bgToggle" class="sr-only peer" checked>
                        <div
                            class="w-10 h-5 bg-gray-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer:bg-[#4a4a4a]">
                        </div>
                    </label>
                </div>
                <button onclick="exportData()"
                    class="px-4 py-2 bg-[#2a2a2a] hover:bg-[#333333] rounded-lg transition flex items-center gap-2 border border-gray-800 text-gray-300">
                    <i class="fas fa-download"></i> Export
                </button>

                <label
                    class="px-4 py-2 bg-[#2a2a2a] hover:bg-[#333333] rounded-lg transition flex items-center gap-2 border border-gray-800 cursor-pointer text-gray-300">
                    <i class="fas fa-upload"></i> Import
                    <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
                </label>
                <div class="flex gap-2">
                    <button onclick="openCategoryModal()"
                        class="px-4 py-2 bg-[#2a2a2a] hover:bg-[#333333] rounded-lg transition flex items-center gap-2 border border-gray-800 text-gray-300">
                        <i class="fas fa-tags"></i> Categories
                    </button>
                    <button onclick="openContentTypeModal()"
                        class="px-4 py-2 bg-[#2a2a2a] hover:bg-[#333333] rounded-lg transition flex items-center gap-2 border border-gray-800 text-gray-300">
                        <i class="fas fa-layer-group"></i> Types
                    </button>
                </div>
                <button onclick="openModal()"
                    class="px-4 py-2 bg-[#4a4a4a] hover:bg-[#5a5a5a] rounded-lg transition flex items-center gap-2 text-white">
                    <i class="fas fa-plus"></i> Add Prompt
                </button>
            </div>
        </header>

        <!-- Filters & Sorting -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 bg-[#1a1a1a] p-6 rounded-2xl border border-gray-900">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Category</label>
                <select id="filterCategory" onchange="renderPrompts()"
                    class="w-full p-2 rounded-lg bg-[#1a1a1a] border border-gray-800">
                    <!-- Populated by JS -->
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Content Type</label>
                <select id="filterType" onchange="renderPrompts()"
                    class="w-full p-2 rounded-lg bg-[#1a1a1a] border border-gray-800">
                    <!-- Populated by JS -->
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Sort By</label>
                <select id="sortBy" onchange="renderPrompts()"
                    class="w-full p-2 rounded-lg bg-[#1a1a1a] border border-gray-800">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="az">A to Z</option>
                    <option value="za">Z to A</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Search</label>
                <input type="text" id="searchInput" placeholder="Search prompts..." oninput="renderPrompts()"
                    class="w-full p-2 rounded-lg bg-[#1a1a1a] border border-gray-800">
            </div>
        </div>

        <!-- Prompt Grid -->
        <div id="promptGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Prompts will be injected here -->
        </div>
    </div>

    <!-- Modal for Add/Edit -->
    <div id="modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50 backdrop-blur-md">
        <div class="bg-[#1a1a1a] border border-gray-800 w-full max-w-2xl rounded-3xl p-8 shadow-2xl animate-fade-in">
            <h2 id="modalTitle" class="text-2xl font-bold mb-6 text-white">Add New Prompt</h2>
            <form id="promptForm" onsubmit="savePrompt(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="hidden" id="editId">
                <div class="md:col-span-2">
                    <label class="block text-sm mb-1 text-gray-400">Title</label>
                    <input type="text" id="title" required
                        class="w-full p-3 rounded-xl bg-[#2a2a2a] border border-gray-800">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm mb-1 text-gray-400">Category</label>
                    <select id="category" required
                        class="w-full p-3 rounded-xl bg-[#2a2a2a] border border-gray-800"></select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm mb-1 text-gray-400">Content Type</label>
                    <select id="contentType" required
                        class="w-full p-3 rounded-xl bg-[#2a2a2a] border border-gray-800"></select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm mb-1 text-gray-400">Prompt Content</label>
                    <textarea id="promptContent" required rows="6"
                        class="w-full p-3 rounded-xl bg-[#2a2a2a] border border-gray-800"
                        style="padding-left: 0.75rem;"></textarea>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm mb-1 text-gray-400">Tags (comma separated)</label>
                    <input type="text" id="tags" placeholder="e.g. creative, python, fast"
                        class="w-full p-3 rounded-xl bg-[#2a2a2a] border border-gray-800">
                </div>
                <div class="flex items-end justify-between md:col-span-2 mt-4">
                    <button type="button" onclick="closeModal()"
                        class="px-6 py-2 bg-[#333333] hover:bg-[#444444] rounded-xl transition text-white">Cancel</button>
                    <div class="flex gap-3">
                        <button type="submit"
                            class="px-8 py-2 bg-gray-600 hover:bg-gray-500 rounded-xl transition font-bold text-white">Save Prompt</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Category Management -->
    <div id="categoryModal"
        class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50 backdrop-blur-md">
        <div class="bg-[#1a1a1a] border border-gray-800 w-full max-w-md rounded-3xl p-8 shadow-2xl animate-fade-in">
            <h2 id="catModalTitle" class="text-2xl font-bold mb-6 text-white">Manage Categories</h2>
            <div class="mb-4">
                <label class="block text-sm mb-1 text-gray-400">Category Name</label>
                <input type="text" id="newCatName" placeholder="e.g. Research"
                    class="w-full p-3 rounded-xl bg-[#2a2a2a] border border-gray-800">
            </div>
            <button onclick="addCategory()"
                class="w-full px-8 py-2 bg-gray-600 hover:bg-gray-500 rounded-xl transition font-bold text-white mb-6">Add Category</button>
            <div class="max-h-48 overflow-y-auto custom-scrollbar" id="categoryList"></div>
            <button onclick="closeCategoryModal()"
                class="w-full py-2 bg-[#333333] hover:bg-[#444444] rounded-xl transition text-white mt-4">Close</button>
        </div>
    </div>

    <!-- Modal for Content Type Management -->
    <div id="contentTypeModal"
        class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50 backdrop-blur-md">
        <div class="bg-[#1a1a1a] border border-gray-800 w-full max-w-md rounded-3xl p-8 shadow-2xl animate-fade-in">
            <h2 id="typeModalTitle" class="text-2xl font-bold mb-6 text-white">Manage Content Types</h2>
            <div class="mb-4">
                <label class="block text-sm mb-1 text-gray-400">Type Name</label>
                <input type="text" id="newTypeName" placeholder="e.g. Scripting"
                    class="w-full p-3 rounded-xl bg-[#2a2a2a] border border-gray-800">
            </div>
            <button onclick="addContentType()"
                class="w-full px-8 py-2 bg-gray-600 hover:bg-gray-500 rounded-xl transition font-bold text-white mb-6">Add Type</button>
            <div class="max-h-48 overflow-y-auto custom-scrollbar" id="contentTypeList"></div>
            <button onclick="closeContentTypeModal()"
                class="w-full py-2 bg-[#333333] hover:bg-[#444444] rounded-xl transition text-white mt-4">Close</button>
        </div>
    </div>

    <!-- Link to external JavaScript -->
    <script src="script.js"></script>
</body>
</html>
